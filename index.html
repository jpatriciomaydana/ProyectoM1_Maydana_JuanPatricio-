<!DOCTYPE html>
<html lang="es">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--Este es el css-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/styles.css">
    <title>Proyecto M1 FT76</title>
 </head>
    <!--ejemplo para doc-->
    <!--![Tux, the Linux mascot](/assets/images/tux.png)-->
 <body>
      <!--//Es el encabezado// -->  
        <header>
            <nav class="nav">
                <div class="nav__brand">
                    <span class="nav__logo">Paleta de Colores</span>
                    <span class="nav__sub">By Colorfly Studio</span>
                </div>
                
                <ul class="nav__links">
                    <li><a class="nav__link" href="#generador">"Generador"</a></li>
                    <li><a class="nav__link" href="#guardadas">"Mi paleta"</a></li>
                </ul>
            </nav>        
        </header>    

        <!--Contenido del generador-->
        <main>
            <section class="hero">
                <h2 class="hero__titulo">Encuentra tu combinación</h2>
                <p class="hero__sub">Generá paletas de color únicas con Colorfly Studio</p>
            </section>

                <!--recordar colocar button-->

                <div class="controles">
                    <button class="boton boton--primario" id="generar">Generar Paleta</button>
                    <div class="controles__campo">
                        <label class="controles__label" for="cantidad">cantidad de colores</label>
                        <select class="select" id="cantidad">
                            <option value="6">6 Colores</option>
                            <option value="8">8 Colores</option>
                            <option value="9">9 Colores</option>
                        </select>                         
                    </div>
                    <button class="boton boton--primario" id="guardar">Guardar paleta</button>  
                </div>  
                <section class="galeria" id="galeria"></section>    
                <section id="guardadas">
                    <h2 class="guardada__titulo">Mi paleta</h2>
                    <button class="boton boton--primario" id="limpiar">Limpiar historial</button>
                    <div id="lista-guardadas"></div>
                </section>      
            </section>
        </main>
        
        <footer>
             <p>Colorfly Studio &copy; Junio 2026</p>
        </footer>

        <script src="./js/index.js"></script>
 </body>

</html>
